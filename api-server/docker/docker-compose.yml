services:
  api-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: api-server
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/clue_collector
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=dev-secret-key-change-in-prod
      - QWEN_API_KEY=${QWEN_API_KEY}
      - APP_PORT=8001
      - APP_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - clue-collector-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: clue-collector-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=clue_collector
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - clue-collector-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clue_collector"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clue-collector-redis
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - clue-collector-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  clue-collector-network:
    driver: bridge