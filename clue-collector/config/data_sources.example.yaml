# 数据源配置说明
#
# 数据源已改为数据库存储，不再使用配置文件。
# 请使用以下方式管理数据源：
#
# 1. 通过 API 接口管理
#    POST /api/data-sources - 创建数据源
#    PUT /api/data-sources/{id} - 更新数据源
#    DELETE /api/data-sources/{id} - 删除数据源
#
# 2. 通过种子数据脚本初始化
#    python scripts/seed_data_sources.py
#
# 3. 通过管理脚本
#    python scripts/manage_sources.py --add --name "微博热搜" --type hotlist
#
# 数据库表结构：
# - source_groups: 数据源分组（热榜组、微博KOL组等）
# - data_sources: 数据源配置（URL、解析规则、采集器类型等）

# ==================== 数据源类型 ====================
# hotlist: 热榜数据源（微博热搜、知乎热榜、抖音热点等）
# account: 社交账号（微博 KOL、微信公众号等）
# video: 短视频账号（抖音博主、小红书博主等）
# custom: 自定义 API 数据源

# ==================== 采集器类型 ====================
# configurable: 配置化采集器（通过 URL 和解析规则配置）
# plugin: 插件化采集器（需要开发专用插件）

# ==================== config 字段说明 ====================
# url: 目标地址
# method: HTTP 方法（GET/POST）
# parse_type: 解析类型（css/json/xpath）
# parse_rules: 解析规则
#   - container: 容器选择器
#   - title: 标题选择器/路径
#   - heat: 热度选择器/路径
#   - link: 链接选择器/路径
# use_playwright: 是否使用 Playwright 动态渲染
# timeout: 超时时间（毫秒）
# wait_for_selector: 等待特定元素的选择器

