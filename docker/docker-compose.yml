services:
  # ==================== Nginx 入口 ====================
  nginx:
    image: nginx:alpine
    container_name: newsradar-nginx
    ports:
      - "8084:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - newsradar-network
    restart: unless-stopped

  # ==================== 前端 ====================
  web:
    build:
      context: ../web
      dockerfile: web.Dockerfile
    container_name: newsradar-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/newsradar
    depends_on:
      api:
        condition: service_started
    networks:
      - newsradar-network
    restart: unless-stopped

  # ==================== API 服务 ====================
  api:
    build:
      context: ../api
      dockerfile: api.Dockerfile
    container_name: newsradar-api
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/newsradar
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-prod}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - APP_PORT=8001
      - APP_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - newsradar-network
    restart: unless-stopped

  # ==================== 爬虫服务 ====================
  collector:
    build:
      context: ../clue-collector
      dockerfile: clue-collector.Dockerfile
    container_name: newsradar-collector
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/newsradar
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_API_BASE=${QWEN_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - TRANSLATION_ENABLED=${TRANSLATION_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - newsradar-network
    restart: unless-stopped

  # ==================== 数据库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: newsradar-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=newsradar
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - newsradar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d newsradar"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: newsradar-redis
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - newsradar-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  newsradar-network:
    driver: bridge