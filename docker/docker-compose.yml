services:
  # ==================== Nginx 入口 ====================
  nginx:
    image: nginx:alpine
    container_name: newsradar-nginx
    ports:
      - "${NGINX_PORT:-8084}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - newsradar-network
    restart: unless-stopped

  # ==================== 前端 ====================
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /newsradar
    container_name: newsradar-web
    environment:
      - NEXT_PUBLIC_API_URL=/newsradar
      - HOSTNAME=0.0.0.0
    depends_on:
      api:
        condition: service_started
    networks:
      - newsradar-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  # ==================== API 服务 ====================
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: newsradar-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-newsradar}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-prod}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_API_BASE=${QWEN_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
      - COLLECTOR_API_URL=http://collector:8002
      - APP_PORT=8001
      - APP_ENV=${APP_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - newsradar-network
    restart: unless-stopped

  # ==================== 爬虫服务 ====================
  collector:
    build:
      context: ../clue-collector
      dockerfile: Dockerfile
    container_name: newsradar-collector
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-newsradar}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_API_BASE=${QWEN_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - TRANSLATION_ENABLED=${TRANSLATION_ENABLED:-true}
      - TRANSLATION_THINKING_ENABLED=${TRANSLATION_THINKING_ENABLED:-false}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - newsradar-network
    restart: unless-stopped

  # ==================== 数据库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: newsradar-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-newsradar}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - newsradar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-newsradar}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: newsradar-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - newsradar-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  newsradar-network:
    driver: bridge