server {
    listen 80;

    # 前端 - Next.js 静态资源需要特殊处理
    location /newsradar/ {
        proxy_pass http://web:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Next.js _next 静态资源
        location /newsradar/_next/ {
            proxy_pass http://web:3000/_next/;
            proxy_cache_valid 200 60d;
            add_header Cache-Control "public, immutable, max-age=31536000";
        }
    }

    # API 服务
    location /newsradar/api/ {
        proxy_pass http://api:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js 静态资源（无 /newsradar 前缀的直接访问）
    location /_next/ {
        proxy_pass http://web:3000/_next/;
        proxy_cache_valid 200 60d;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # 前端页面路由（/ai-discovery, /outlines, /workbench 等）
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 健康检查端点
    location /newsradar/health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}